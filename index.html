<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felicidades, Ainoa y Dani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8;
    --green-dark: #2D3B2A;
    --green-mid: #4A5E46;
    --green-light: #7A9470;
    --green-pale: #B8C9B0;
    --cocoa: #5C3E2E;
    --cocoa-light: #8B6150;
    --terracotta: #C4674A;
    --sand: #D4B896;
    --sand-light: #E8D8C4;
    --off-white: #FAF7F2;
    --road: #9B9088;
    --road-light: #B8B0A6;
    --mountain1: #8FA882;
    --mountain2: #6B8864;
    --sky-top: #C9D9C0;
    --sky-bottom: #DDE8D5;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Instrument Sans', sans-serif;
    overflow: hidden;
  }

  .postcard {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 20px 24px;
    max-width: 520px;
    margin: 0 auto;
    gap: 0;
  }

  .title-area {
    text-align: center;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--cocoa-light);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 5.5vw, 34px);
    color: var(--green-dark);
    line-height: 1.15;
    font-weight: 400;
  }

  .title em {
    font-style: italic;
    color: var(--cocoa);
  }

  /* SCENE */
  .scene-wrapper {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: var(--sky-bottom);
    position: relative;
    aspect-ratio: 4/3;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.8s forwards;
    box-shadow: 0 2px 24px rgba(45, 59, 42, 0.12);
  }

  .scene-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Trail text — banner behind van */
  .trail-text {
    display: none;
  }

  /* Gift button */
  .gift-btn {
    margin-top: 20px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    pointer-events: none;
  }

  .gift-btn.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .gift-btn button {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--cocoa);
    background: var(--off-white);
    border: 0.5px solid var(--sand);
    border-radius: 40px;
    padding: 11px 28px;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .gift-btn button:hover {
    background: var(--sand-light);
    border-color: var(--cocoa-light);
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45, 59, 42, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    visibility: visible;
  }

  .modal-card {
    background: var(--off-white);
    border-radius: 20px;
    padding: 40px 36px 36px;
    max-width: 340px;
    width: 100%;
    position: relative;
    transform: scale(0.9) translateY(12px);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    box-shadow: 0 8px 40px rgba(45, 59, 42, 0.18);
  }

  .modal-overlay.open .modal-card {
    transform: scale(1) translateY(0);
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--sand-light);
    color: var(--cocoa);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: background 0.2s;
  }

  .modal-close:hover { background: var(--sand); }

  .modal-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--cocoa-light);
    border: 0.5px solid var(--sand);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--green-dark);
    font-weight: 400;
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .modal-body {
    font-size: 16px;
    color: var(--cocoa-light);
    line-height: 1.6;
  }

  .modal-body strong {
    color: var(--cocoa);
    font-weight: 600;
  }

  .modal-divider {
    width: 32px;
    height: 1px;
    background: var(--sand);
    margin: 20px auto;
  }

  .modal-footnote {
    font-size: 11px;
    color: var(--road);
    letter-spacing: 0.05em;
    font-style: italic;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes vanMove {
    from { transform: translateX(-160px); }
    to   { transform: translateX(660px); }
  }

  @keyframes vanAppear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  #van {
    animation: none;
  }

  @keyframes treeFast {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-240px); }
  }

  @keyframes treeSlow {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-100px); }
  }

  @keyframes cloudDrift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-60px); }
  }
</style>
</head>
<body>

<div class="postcard">

  <div class="title-area">
    <p class="eyebrow">27 · III · 2026</p>
    <h1 class="title">Felicidades,<br><em>Ainoa y Dani</em></h1>
  </div>

  <div class="scene-wrapper" id="scene">
    <svg class="scene-svg" viewBox="0 0 520 390" xmlns="http://www.w3.org/2000/svg" id="main-svg">
      <defs>
        <clipPath id="sceneClip">
          <rect width="520" height="390" rx="0"/>
        </clipPath>
      </defs>

      <g clip-path="url(#sceneClip)">

        <!-- Sky gradient via rects -->
        <rect width="520" height="390" fill="#D4E2CC"/>
        <rect width="520" height="220" fill="#C2D6B8"/>
        <rect width="520" height="160" fill="#B8CEAC"/>

        <!-- Clouds -->
        <g id="clouds" style="animation: cloudDrift 18s linear 1.5s infinite alternate;">
          <ellipse cx="80" cy="70" rx="42" ry="18" fill="#EAF0E4" opacity="0.7"/>
          <ellipse cx="115" cy="58" rx="28" ry="15" fill="#EAF0E4" opacity="0.6"/>
          <ellipse cx="52" cy="62" rx="24" ry="13" fill="#EAF0E4" opacity="0.5"/>

          <ellipse cx="310" cy="50" rx="36" ry="14" fill="#EAF0E4" opacity="0.5"/>
          <ellipse cx="340" cy="40" rx="22" ry="11" fill="#EAF0E4" opacity="0.45"/>

          <ellipse cx="450" cy="75" rx="30" ry="12" fill="#EAF0E4" opacity="0.4"/>
          <ellipse cx="474" cy="65" rx="18" ry="9" fill="#EAF0E4" opacity="0.35"/>
        </g>

        <!-- Mountains background (slow parallax) -->
        <g id="mountains-bg" style="animation: treeSlow 22s linear 1.5s infinite;">
          <polygon points="0,210 80,110 160,210" fill="#8FA882"/>
          <polygon points="60,210 160,90 260,210" fill="#7A9E74"/>
          <polygon points="180,210 280,105 380,210" fill="#8FA882"/>
          <polygon points="300,210 400,120 500,210" fill="#7A9E74"/>
          <polygon points="420,210 520,100 620,210" fill="#8FA882"/>
        </g>

        <!-- Mountains foreground -->
        <g id="mountains-fg" style="animation: treeSlow 16s linear 1.5s infinite;">
          <polygon points="-40,230 60,155 160,230" fill="#6B8864"/>
          <polygon points="100,230 220,140 340,230" fill="#5C7A55"/>
          <polygon points="280,230 390,150 500,230" fill="#6B8864"/>
          <polygon points="440,230 560,145 660,230" fill="#5C7A55"/>
        </g>

        <!-- Ground -->
        <rect y="230" width="520" height="160" fill="#8B7355"/>
        <!-- Ground grass strip -->
        <rect y="228" width="520" height="18" fill="#7A9470" rx="2"/>
        <rect y="242" width="520" height="8" fill="#6B8460"/>

        <!-- Road -->
        <path d="M -20 340 Q 260 285 540 340" fill="#9B9088" stroke="none"/>
        <path d="M -20 370 Q 260 310 540 370" fill="#8B8078"/>
        <!-- Road dashes -->
        <g opacity="0.4">
          <rect x="30" y="318" width="28" height="3" rx="1.5" fill="#D4B896" transform="rotate(-2 44 319)"/>
          <rect x="100" y="313" width="28" height="3" rx="1.5" fill="#D4B896" transform="rotate(-1.5 114 314)"/>
          <rect x="170" y="309" width="28" height="3" rx="1.5" fill="#D4B896" transform="rotate(-1 184 309)"/>
          <rect x="240" y="307" width="28" height="3" rx="1.5" fill="#D4B896" transform="rotate(-0.5 254 307)"/>
          <rect x="310" y="307" width="28" height="3" rx="1.5" fill="#D4B896" transform="rotate(0.5 324 307)"/>
          <rect x="380" y="309" width="28" height="3" rx="1.5" fill="#D4B896" transform="rotate(1 394 309)"/>
          <rect x="450" y="312" width="28" height="3" rx="1.5" fill="#D4B896" transform="rotate(1.5 464 313)"/>
        </g>

        <!-- Trees back layer (faster parallax) -->
        <g id="trees-back" style="animation: treeFast 14s linear 1.5s infinite;">
          <!-- Tree group 1 -->
          <g transform="translate(50, 210)">
            <rect x="-3" y="18" width="6" height="16" fill="#5C3E2E"/>
            <ellipse cx="0" cy="14" rx="12" ry="16" fill="#4A5E46"/>
            <ellipse cx="0" cy="8" rx="8" ry="10" fill="#5A7056"/>
          </g>
          <g transform="translate(90, 215)">
            <rect x="-2" y="14" width="5" height="12" fill="#5C3E2E"/>
            <ellipse cx="0" cy="10" rx="9" ry="12" fill="#3D5038"/>
            <ellipse cx="0" cy="5" rx="6" ry="8" fill="#4A5E46"/>
          </g>
          <!-- Tree group 2 -->
          <g transform="translate(210, 212)">
            <rect x="-3" y="18" width="6" height="16" fill="#5C3E2E"/>
            <ellipse cx="0" cy="14" rx="12" ry="16" fill="#4A5E46"/>
            <ellipse cx="0" cy="8" rx="8" ry="10" fill="#5A7056"/>
          </g>
          <!-- Tree group 3 -->
          <g transform="translate(340, 210)">
            <rect x="-3" y="18" width="6" height="16" fill="#5C3E2E"/>
            <ellipse cx="0" cy="14" rx="12" ry="16" fill="#3D5038"/>
          </g>
          <g transform="translate(375, 214)">
            <rect x="-2" y="14" width="5" height="12" fill="#5C3E2E"/>
            <ellipse cx="0" cy="10" rx="9" ry="12" fill="#4A5E46"/>
          </g>
          <!-- Tree group 4 -->
          <g transform="translate(490, 212)">
            <rect x="-3" y="18" width="6" height="14" fill="#5C3E2E"/>
            <ellipse cx="0" cy="14" rx="11" ry="14" fill="#4A5E46"/>
          </g>
        </g>

        <!-- Road Sign — decorative, legible -->
        <g id="road-sign">
          <!-- Post -->
          <rect x="338" y="258" width="5" height="42" rx="2" fill="#7A6655"/>
          <!-- Sign board — taller to fit text + arrow separated -->
          <rect x="306" y="226" width="72" height="38" rx="5" fill="#F5F0E8" stroke="#8B6150" stroke-width="1.2"/>
          <!-- Sign text — bigger, left-aligned with padding -->
          <text x="342" y="239" font-size="8.5" fill="#3A2820" font-family="'Instrument Sans', sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.02em">Muchos viajes</text>
          <text x="342" y="250" font-size="8.5" fill="#3A2820" font-family="'Instrument Sans', sans-serif" font-weight="700" text-anchor="middle" letter-spacing="0.02em">juntos</text>
          <!-- Divider line -->
          <line x1="312" y1="254" x2="372" y2="254" stroke="#D4B896" stroke-width="0.8"/>
          <!-- Arrow row — centered below text, clearly separate -->
          <line x1="331" y1="259" x2="352" y2="259" stroke="#C4674A" stroke-width="1.5" stroke-linecap="round"/>
          <polyline points="348,256 353,259 348,262" fill="none" stroke="#C4674A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- Trees front layer -->
        <g id="trees-front" style="animation: treeFast 10s linear 1.5s infinite;">
          <g transform="translate(20, 248)">
            <rect x="-4" y="22" width="8" height="22" fill="#4A2E1E"/>
            <ellipse cx="0" cy="16" rx="16" ry="22" fill="#2D3B2A"/>
            <ellipse cx="0" cy="7" rx="10" ry="13" fill="#3D5038"/>
          </g>
          <g transform="translate(150, 252)">
            <rect x="-4" y="18" width="7" height="18" fill="#4A2E1E"/>
            <ellipse cx="0" cy="13" rx="13" ry="18" fill="#2D3B2A"/>
          </g>
          <g transform="translate(460, 250)">
            <rect x="-4" y="20" width="8" height="20" fill="#4A2E1E"/>
            <ellipse cx="0" cy="14" rx="14" ry="20" fill="#2D3B2A"/>
            <ellipse cx="0" cy="6" rx="9" ry="11" fill="#3D5038"/>
          </g>
        </g>

        <!-- Banner behind van -->
        <g id="van-banner" opacity="0" transform="translate(-160, 0)">
          <!-- String from van rear -->
          <line id="banner-line" x1="0" y1="305" x2="-12" y2="305" stroke="#C4B8A8" stroke-width="0.8" stroke-dasharray="2,2"/>
          <!-- Banner flag — wide enough for full text -->
          <rect id="banner-rect" x="-312" y="295" width="300" height="20" rx="3" fill="#F5F0E8" stroke="#D4B896" stroke-width="0.6" opacity="0.92"/>
          <text id="banner-text" x="-162" y="309" font-size="8" fill="#8B6150" font-family="'Instrument Sans', sans-serif" font-weight="500" text-anchor="middle" letter-spacing="0.08em">QUE LA VIDA JUNTOS SEA UNA GRAN AVENTURA</text>
        </g>

        <!-- VAN — animated left to right -->
        <g id="van" transform="translate(-160, 0)">

          <!-- Van shadow -->
          <ellipse cx="72" cy="321" rx="55" ry="8" fill="#5C3E2E" opacity="0.2"/>

          <!-- Van body -->
          <rect x="18" y="282" width="108" height="42" rx="8" fill="#F5F0E8"/>
          <!-- Van roof -->
          <rect x="28" y="268" width="86" height="18" rx="6" fill="#E8E2D8"/>
          <!-- Roof pop-top detail -->
          <rect x="40" y="262" width="56" height="10" rx="4" fill="#DDD8CE"/>

          <!-- Van side stripe -->
          <rect x="18" y="295" width="108" height="6" rx="0" fill="#C4674A" opacity="0.7"/>

          <!-- Windows -->
          <rect x="34" y="272" width="22" height="13" rx="3" fill="#4A5E46" opacity="0.6"/>
          <rect x="62" y="272" width="22" height="13" rx="3" fill="#4A5E46" opacity="0.6"/>
          <!-- Windshield -->
          <rect x="90" y="270" width="18" height="15" rx="3" fill="#7A9470" opacity="0.5"/>

          <!-- Van front -->
          <rect x="108" y="278" width="18" height="46" rx="6" fill="#E8E2D8"/>
          <!-- Headlight -->
          <ellipse cx="122" cy="308" rx="5" ry="4" fill="#D4B896"/>
          <!-- Front grille -->
          <rect x="110" y="300" width="14" height="8" rx="2" fill="#C4B8A8"/>

          <!-- Wheel back -->
          <circle cx="42" cy="322" r="12" fill="#2D3B2A"/>
          <circle cx="42" cy="322" r="7" fill="#B8B0A6"/>
          <circle cx="42" cy="322" r="3" fill="#2D3B2A"/>

          <!-- Wheel front -->
          <circle cx="106" cy="322" r="12" fill="#2D3B2A"/>
          <circle cx="106" cy="322" r="7" fill="#B8B0A6"/>
          <circle cx="106" cy="322" r="3" fill="#2D3B2A"/>

          <!-- VW emblem -->
          <circle cx="80" cy="305" r="6" fill="#E8E2D8" stroke="#C4B8A8" stroke-width="1"/>
          <text x="80" y="308" font-size="6" fill="#5C3E2E" font-family="'Instrument Sans', sans-serif" font-weight="700" text-anchor="middle">VW</text>

          <!-- Rear view mirror -->
          <rect x="8" y="280" width="8" height="4" rx="1" fill="#D4C8B4"/>
        </g>

      </g>
    </svg>

    <div class="trail-text" id="trail">
      <span class="trail-inner" id="trail-inner">QUE LA VIDA JUNTOS SEA UNA GRAN AVENTURA</span>
    </div>
  </div>

  <div class="gift-btn" id="gift-btn">
    <button onclick="openModal()">¡Sorpresa!</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-card" id="modal-card">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <span class="modal-tag">Para vosotros</span>
    <h2 class="modal-title">Un detallito</h2>
    <div class="modal-divider"></div>
    <p class="modal-body">Les cayó un Bizum 💸</p>
    <div class="modal-divider"></div>
    <p class="modal-footnote">No es lo mismo que estar ahí, pero casi.</p>
  </div>
</div>

<script>
  const VAN_DELAY = 1800;
  const VAN_DURATION = 11000;
  const VAN_START = -160;
  const VAN_END = 680;

  const vanEl = document.getElementById('van');
  const bannerEl = document.getElementById('van-banner');

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  let startTime = null;
  let running = false;

  function tick(now) {
    if (!startTime) startTime = now;
    const elapsed = now - startTime;
    const t = Math.min(elapsed / VAN_DURATION, 1);
    const eased = easeInOut(t);
    const x = VAN_START + eased * (VAN_END - VAN_START);

    vanEl.setAttribute('transform', `translate(${x}, 0)`);
    bannerEl.setAttribute('transform', `translate(${x}, 0)`);

    if (t < 0.15) {
      bannerEl.setAttribute('opacity', (t / 0.15) * 0.95);
    } else if (t > 0.85) {
      bannerEl.setAttribute('opacity', ((1 - t) / 0.15) * 0.95);
    } else {
      bannerEl.setAttribute('opacity', '0.95');
    }

    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      startTime = null;
      setTimeout(() => requestAnimationFrame(tick), 800);
    }
  }

  setTimeout(() => {
    requestAnimationFrame(tick);
  }, VAN_DELAY);

  setTimeout(() => {
    document.getElementById('gift-btn').classList.add('visible');
  }, 3800);

  function openModal() {
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
